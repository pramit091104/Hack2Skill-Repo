# Google Cloud Build CI/CD Configuration
steps:
  # 1. Install dependencies
  - name: 'gcr.io/cloud-builders/npm'
    args: ['ci']
    dir: 'backend'
    
  # 2. Compile TypeScript
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: 'backend'
    
  # 3. Build Docker Context
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nutrismart-backend', '.']
    dir: 'backend'
    
  # 4. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutrismart-backend']
    
  # 5. Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: 
      - 'run'
      - 'deploy'
      - 'nutrismart-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutrismart-backend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,FIREBASE_PROJECT_ID=nutrsmartai,FIREBASE_CLIENT_EMAIL=nutrismart-service@nutrsmartai.iam.gserviceaccount.com,FIREBASE_STORAGE_BUCKET=nutrsmartai.firebasestorage.app,GEMINI_API_KEY=REDACTED'

images:
  - 'gcr.io/$PROJECT_ID/nutrismart-backend'
